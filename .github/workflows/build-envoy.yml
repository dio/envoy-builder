name: Build Envoy

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA, branch, or tag'
        required: false
        default: 'main'
        type: string
      repo:
        description: 'Source repository (owner/repo)'
        required: false
        default: 'envoyproxy/envoy'
        type: string
      patch_url:
        description: 'URL to a .patch file to apply before building (optional)'
        required: false
        type: string
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - darwin-arm64
          - linux-arm64
          - linux-amd64

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d # v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MINI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install envoy-mini-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download \
            --repo dio/envoy-mini-builder \
            --pattern '*linux_amd64*.tar.gz' \
            --output /tmp/emb.tar.gz
          tar -xzf /tmp/emb.tar.gz -C /tmp envoy-mini-builder
          sudo mv /tmp/envoy-mini-builder /usr/local/bin/envoy-mini-builder
          envoy-mini-builder --version

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILDBUDDY_API_KEY_DARWIN_ARM64: ${{ secrets.BUILDBUDDY_API_KEY_DARWIN_ARM64 }}
          BUILDBUDDY_API_KEY_LINUX_ARM64: ${{ secrets.BUILDBUDDY_API_KEY_LINUX_ARM64 }}
          BUILDBUDDY_API_KEY_LINUX_AMD64: ${{ secrets.BUILDBUDDY_API_KEY_LINUX_AMD64 }}
        run: |
          SHA="${{ github.event.inputs.sha || 'main' }}"
          PLATFORMS="${{ github.event.inputs.platforms || 'all' }}"

          PLATFORM_FLAG="--all-platforms"
          if [[ "$PLATFORMS" != "all" ]]; then
            PLATFORM_FLAG="--platform $PLATFORMS"
          fi

          PATCH_FLAG=""
          if [[ -n "${{ github.event.inputs.patch_url }}" ]]; then
            PATCH_FLAG="--patch ${{ github.event.inputs.patch_url }}"
          fi

          envoy-mini-builder build \
            --sha "$SHA" \
            --repo "${{ github.event.inputs.repo || 'envoyproxy/envoy' }}" \
            --host dio@mini \
            --gh-repo dio/envoy-builder \
            $PLATFORM_FLAG \
            $PATCH_FLAG
